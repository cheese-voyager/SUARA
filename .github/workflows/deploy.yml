name: Deploy SUARA to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 072092344186.dkr.ecr.ap-southeast-2.amazonaws.com
  BACKEND_REPO: suara_ecsbe
  FRONTEND_REPO: suara_ecsfe
  ECS_CLUSTER: suara_ecs
  BACKEND_SERVICE: suara_ecsbe
  FRONTEND_SERVICE: suara_ecsfe
  BACKEND_TASK_FAMILY: suara_ecsbe
  FRONTEND_TASK_FAMILY: suara_ecsfe
  BACKEND_CONTAINER_NAME: suara_ecsbe
  FRONTEND_CONTAINER_NAME: suara_ecsfe

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────
      # 1. Ambil kode terbaru dari GitHub
      # ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────
      # 2. Konfigurasi kredensial AWS
      # ──────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      # ──────────────────────────────────────
      # 3. Login ke Amazon ECR
      # ──────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ──────────────────────────────────────
      # 4. Build & Push image BACKEND
      # ──────────────────────────────────────
      - name: Build and push BACKEND image to ECR
        id: build-backend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG
          echo "backend_image=$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────
      # 5. Build & Push image FRONTEND
      # ──────────────────────────────────────
      - name: Build and push FRONTEND image to ECR
        id: build-frontend
        env:
          IMAGE_TAG: ${{ github.sha }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG
          echo "frontend_image=$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────
      # 6. Daftarkan & Deploy BACKEND Task Definition
      # ──────────────────────────────────────
      - name: Register BACKEND task definition and deploy to ECS
        run: |
          IMAGE=$ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}

          # Inject image baru ke dalam file task definition
          NEW_TASK_DEF=$(cat .aws/backend-task-def.json | \
            jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE')

          # Daftarkan task definition baru ke ECS
          TASK_ARN=$(echo "$NEW_TASK_DEF" | \
            aws ecs register-task-definition \
              --cli-input-json file:///dev/stdin \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

          echo "Registered task: $TASK_ARN"

          # Deploy ke ECS Service
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --task-definition $TASK_ARN \
            --force-new-deployment

          echo "Backend deployed!"

      # ──────────────────────────────────────
      # 7. Daftarkan & Deploy FRONTEND Task Definition
      # ──────────────────────────────────────
      - name: Register FRONTEND task definition and deploy to ECS
        run: |
          IMAGE=$ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}

          # Inject image baru ke dalam file task definition
          NEW_TASK_DEF=$(cat .aws/frontend-task-def.json | \
            jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE')

          # Daftarkan task definition baru ke ECS
          TASK_ARN=$(echo "$NEW_TASK_DEF" | \
            aws ecs register-task-definition \
              --cli-input-json file:///dev/stdin \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

          echo "Registered task: $TASK_ARN"

          # Deploy ke ECS Service
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --task-definition $TASK_ARN \
            --force-new-deployment

          echo "Frontend deployed!"
